name: One-time Google priority patch

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Apply strict Google priority
        run: python scripts/one_time_google_priority_patch.py

      - name: Validate changes
        run: |
          python -m py_compile scripts/update_data.py
          git diff --check
          grep -q "strict Google priority for Yandex/MTS PRG" scripts/update_data.py
          grep -q "including rows with zero values" index.html

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Enforce Google priority for Yandex MTS PRG"
          git push
