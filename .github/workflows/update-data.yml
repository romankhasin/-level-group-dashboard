name: Update dashboard data

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-data.yml"
      - "scripts/update_data.py"
      - "requirements.txt"
  schedule:
    # GitHub Actions uses UTC. 03:00 UTC = 06:00 Moscow.
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-dashboard-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download and update dashboard data
        env:
          YANDEX_METRIKA_TOKEN: ${{ secrets.YANDEX_METRIKA_TOKEN }}
          TARGETADS_TOKEN: ${{ secrets.TARGETADS_TOKEN }}
        run: python scripts/update_data.py

      - name: Commit refreshed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data journal.html
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update dashboard data"
            git push
          fi
