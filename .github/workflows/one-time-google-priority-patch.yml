name: One-time Google priority patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-time-google-priority-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Apply strict Google priority
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}")
              file_path.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "index.html",
              '''    function googleVerifierRowHasMediaFacts(row) {
                return ["impressions", "clicks", "cost"]
                  .some(field => parseNumber((row || {})[field]) !== 0);
              }

              function googleVerifierCoverageKeys() {
                return new Set(
                  (AUTOMATIC_GOOGLE_VERIFIER_ROWS || [])
                    .filter(googleVerifierRowHasMediaFacts)
                    .map(verifierSourceRowKey)
                    .filter(Boolean)
                );
              }
          ''',
              '''    function googleVerifierCoverageKeys() {
                return new Set(
                  (AUTOMATIC_GOOGLE_VERIFIER_ROWS || [])
                    .filter(isYandexMtsPrgVerifierRow)
                    .map(verifierSourceRowKey)
                    .filter(Boolean)
                );
              }
          ''',
          )

          replace_once(
              "index.html",
              '''      // A non-empty Google row wins for the exact date + technical_mark.
                    // If Google is empty or missing, keep Target Ads as the fallback.
                    (AUTOMATIC_GOOGLE_VERIFIER_ROWS || []).forEach((row, index) => {
                      const key = verifierSourceRowKey(row) || `google||${index}`;
                      if (googleVerifierRowHasMediaFacts(row) || !merged.has(key)) {
                        merged.set(key, row);
                      }
                    });
          ''',
              '''      // For Yandex/MTS PRG, the existence of a Google row always wins for
                    // the exact date + technical_mark, including rows with zero values.
                    // Target Ads is used only when that Google row is absent.
                    (AUTOMATIC_GOOGLE_VERIFIER_ROWS || []).forEach((row, index) => {
                      const key = verifierSourceRowKey(row) || `google||${index}`;
                      if (isYandexMtsPrgVerifierRow(row) || !merged.has(key)) {
                        merged.set(key, row);
                      }
                    });
          ''',
          )

          replace_once(
              "scripts/update_data.py",
              '''def merge_verifier_rows(targetads_rows: list[dict], google_rows: list[dict]) -> list[dict]:
              """Merge media facts with Google as a non-empty Yandex/MTS override.

              Target Ads remains the fallback for an exact date + campaign whenever the
              matching Google row is absent or its impressions, clicks, and cost are all
              empty. The merged rows are later parsed into both project and platform
              breakdowns, so the same priority applies at every dashboard level.
              """
              merged: dict[tuple[str, str], dict] = {}
              for row in targetads_rows:
                  campaign = str(row.get("placement_nm") or "")
                  report_date = str(row.get("interaction_dt") or "")
                  if not report_date or not campaign:
                      continue
                  key = (report_date, campaign.lower())
                  merged[key] = row

              for row in google_rows:
                  report_date = str(row.get("interaction_dt") or "")
                  campaign = str(row.get("placement_nm") or "")
                  if not report_date or not campaign:
                      continue
                  key = (report_date, campaign.lower())
                  google_has_media_facts = any(
                      number(row.get(metric)) != 0
                      for metric in ("impressions", "clicks", "cost")
                  )
                  if google_has_media_facts or key not in merged:
                      merged[key] = row

              return sorted(merged.values(), key=lambda row: (row["interaction_dt"], row["placement_nm"]))
          ''',
              '''def is_yandex_mts_prg_campaign(campaign: str) -> bool:
              tokens = [token for token in campaign.strip().lower().split("_") if token]
              return bool(tokens) and tokens[-1] == "prg" and any(
                  platform in tokens for platform in ("yandex", "mts")
              )


          def merge_verifier_rows(targetads_rows: list[dict], google_rows: list[dict]) -> list[dict]:
              """Merge media facts with strict Google priority for Yandex/MTS PRG.

              For an exact date + campaign, any matching Google row wins, including a
              row containing zero values. Target Ads remains the fallback only when the
              Google row is absent. Google rows outside Yandex/MTS PRG are used only when
              Target Ads has no matching row.
              """
              merged: dict[tuple[str, str], dict] = {}
              for row in targetads_rows:
                  campaign = str(row.get("placement_nm") or "")
                  report_date = str(row.get("interaction_dt") or "")
                  if not report_date or not campaign:
                      continue
                  key = (report_date, campaign.lower())
                  merged[key] = row

              for row in google_rows:
                  report_date = str(row.get("interaction_dt") or "")
                  campaign = str(row.get("placement_nm") or "")
                  if not report_date or not campaign:
                      continue
                  key = (report_date, campaign.lower())
                  if is_yandex_mts_prg_campaign(campaign) or key not in merged:
                      merged[key] = row

              return sorted(merged.values(), key=lambda row: (row["interaction_dt"], row["placement_nm"]))
          ''',
          )

          workflow = Path(".github/workflows/one-time-google-priority-patch.yml")
          workflow.unlink()
          PY

      - name: Validate changes
        run: |
          python -m py_compile scripts/update_data.py
          git diff --check
          grep -q "strict Google priority for Yandex/MTS PRG" scripts/update_data.py
          grep -q "including rows with zero values" index.html

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/update_data.py .github/workflows/one-time-google-priority-patch.yml
          git commit -m "Enforce Google priority for Yandex MTS PRG"
          git push
